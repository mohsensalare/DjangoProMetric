name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: py${{ matrix.python }} · Django ${{ matrix.django }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # One representative Python for each supported Django, spanning the
        # oldest and newest of both. Django/Python support windows overlap, so
        # this covers the corners without a full cartesian product.
        include:
          - { python: "3.9", django: "4.2" }
          - { python: "3.10", django: "5.0" }
          - { python: "3.11", django: "5.1" }
          - { python: "3.12", django: "5.2" }
          - { python: "3.13", django: "5.2" }
          - { python: "3.13", django: "6.0" }
          - { python: "3.14", django: "6.0" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          allow-prereleases: true
      - name: Install the package and its test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "Django~=${{ matrix.django }}.0"
      - name: Show the resolved versions
        run: python -c "import django, sys; print('Python', sys.version); print('Django', django.get_version())"
      - name: Run the test suite
        run: python -m pytest

  build:
    name: Build & check distributions
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - name: Validate distribution metadata
        run: python -m twine check --strict dist/*
      - name: Upload the distributions as a build preview
        uses: actions/upload-artifact@v4
        with:
          name: dist-preview
          path: dist/*
          if-no-files-found: error
