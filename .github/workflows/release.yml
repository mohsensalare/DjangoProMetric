name: Release

# Only a version tag can start a public release. Pushing to a branch never
# publishes — see RELEASING.md.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read

jobs:
  verify:
    name: Verify tag and rerun checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - name: Fail unless the tag matches the package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(python -c 'import django_prometric; print(django_prometric.__version__)')"
          echo "tag=$tag package=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag v$tag does not match django_prometric.__version__ ($pkg)."
            exit 1
          fi
      - run: ruff check .
      - run: ruff format --check .
      - run: python -m pytest

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: [verify]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - run: python -m twine check --strict dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: release-dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [build]
    # Manual approval gate — configure required reviewers on this environment.
    environment:
      name: pypi
      url: https://pypi.org/p/django-prometric
    permissions:
      id-token: write  # OIDC token for Trusted Publishing; no PyPI API token
    steps:
      - name: Download the exact artifacts that were built and checked
        uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist
      - name: Publish through Trusted Publishing
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: Create the GitHub Release
    runs-on: ubuntu-latest
    needs: [publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-dist
          path: dist
      - name: Publish the GitHub Release with the distributions attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "$GITHUB_REF_NAME"
          --title "$GITHUB_REF_NAME"
          --generate-notes
          dist/*
