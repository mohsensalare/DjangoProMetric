{% comment %}Base card every dashboard component extends.{% endcomment %}
<section class="pm-card pm-card--{{ component.width }}">
  <header class="pm-card__head">
    <h2>{{ component.title }}</h2>
    {% block head_extra %}{% endblock %}
    <span class="pm-card__source">{{ component.provider.verbose_name }}</span>
  </header>
  {% block body %}{% endblock %}
</section>
